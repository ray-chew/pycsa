name: CI Workflow

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  format-check:
    name: Run Black Formatter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Black
        run: pip install black==26.3.0

      - name: Run Black
        run: black --check .

  reproducibility:
    name: Reproducibility Suite (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: ConorMacBride/install-package@v1
        with:
          apt: libgeos-dev
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install pyCSA + test extras
        run: |
          pip install --upgrade pip
          pip install -e ".[test]"
      - name: Run reproducibility suite with coverage
        run: pytest tests/reproducibility/ -v --cov=pycsa --cov-report=xml --cov-report=term
      - name: Upload coverage artifact
        if: matrix.python == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: warn

  docs:
    name: Build Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ConorMacBride/install-package@v1
        with:
          apt: libgeos-dev graphviz
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10.5"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install sphinx furo sphinx-changelog
      - name: Sphinx build
        run: |
          sphinx-build docs/source _build
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        with:
          publish_branch: gh-pages
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: _build/
          force_orphan: true
