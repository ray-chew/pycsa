name: Publish to PyPI

# Publishes a versioned release to PyPI whenever a GitHub Release is published.
# Uses PyPI Trusted Publishing (OIDC) — no API token or secret is stored.
#
# One-time setup on PyPI (https://pypi.org/manage/account/publishing/):
#   - Project name:   pycsa-specappx
#   - Owner:          ray-chew
#   - Repository:     pyCSA
#   - Workflow name:  publish.yml
#   - Environment:    pypi
#
# Release flow: bump pycsa/__init__.py __version__ -> tag vX.Y.Z -> publish a
# GitHub Release for that tag. The job below checks the tag matches the package
# version, builds sdist + wheel, and uploads to PyPI.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check tag matches package version
        if: github.event_name == 'release'
        run: |
          pkg_ver="$(grep -Po '__version__\s*=\s*"\K[^"]+' pycsa/__init__.py)"
          tag="${GITHUB_REF_NAME#v}"
          echo "package version: $pkg_ver | release tag: $tag"
          if [ "$pkg_ver" != "$tag" ]; then
            echo "::error::Release tag ($tag) does not match pycsa.__version__ ($pkg_ver)"
            exit 1
          fi

      - name: Build
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/pycsa-specappx
    permissions:
      id-token: write  # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
